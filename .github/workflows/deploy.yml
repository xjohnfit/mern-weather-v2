# ============================================
# TROUBLESHOOTING
# ============================================
#
# PROBLEM: Workflow fails at trivy-scan
# SOLUTION:
# 1. Check Trivy output for CVEs
# 2. Update base images: nginx:alpine
# 3. Update npm packages: npm update
# 4. If no fix: Set exit-code: '0' (warning only)
#
# PROBLEM: Docker login fails
# SOLUTION:
# 1. Verify DOCKER_PASSWORD secret exists
# 2. Regenerate Docker Hub access token
# 3. Update GitHub secret with new token
# 4. Check Docker Hub rate limits (100 pulls/6 hours for free tier)
#
# PROBLEM: Build fails - "secret not found"
# SOLUTION:
# 1. Add secrets: VITE_API_KEY, VITE_OPENWEATHER_API_KEY
# 2. Repository → Settings → Secrets → Actions → New secret
# 3. Ensure exact names match workflow file
#
# PROBLEM: kubectl authentication fails
# SOLUTION:
# 1. Verify KUBECONFIG secret exists
# 2. Check base64 encoding: cat kubeconfig.yaml | base64 -w 0
# 3. Verify ServiceAccount token not expired
# 4. Regenerate token: kubectl create token github-actions --duration=8760h
#
# PROBLEM: Deployment rollout timeout
# SOLUTION:
# 1. Check pod status: kubectl get pods
# 2. View pod logs: kubectl logs <pod-name>
# 3. Describe pod: kubectl describe pod <pod-name>
# 4. Common issues:
#    - Image pull error (check Docker Hub, tag exists?)
#    - Container crash (check logs for errors)
#    - Health check failure (readiness probe failing?)
#    - Insufficient resources (CPU/memory limits too high?)
#
# PROBLEM: Deployment succeeds but app doesn't work
# SOLUTION:
# 1. Check Service: kubectl get svc weather-app
# 2. Check Ingress: kubectl get ingress weather-app-ingress
# 3. Check certificate: kubectl get certificate weather-app-tls
# 4. View events: kubectl get events --sort-by='.lastTimestamp'
# 5. Test pod directly: kubectl port-forward pod/<pod-name> 8080:8080
# 6. curl http://localhost:8080 (should return HTML)
