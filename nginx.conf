# ============================================
# NGINX GLOBAL CONFIGURATION
# ============================================

# Number of worker processes
# 'auto' = one worker per CPU core (optimal for performance)
# Workers handle incoming connections simultaneously
worker_processes auto;

# Error log location and level
# 'warn' = log warnings and errors, but not every request
# Logs help debug issues without filling disk with unnecessary info
error_log /var/log/nginx/error.log warn;

# Process ID file location
# Stored in /tmp because non-root user can't write to /var/run
# PID file lets you send signals to nginx (reload, stop, etc.)
pid /tmp/nginx.pid;

# ============================================
# EVENTS BLOCK - Connection Handling
# ============================================
events {
    # Maximum concurrent connections per worker
    # worker_processes * worker_connections = total connections
    # Example: auto (4 CPUs) * 1024 = 4096 concurrent connections
    worker_connections 1024;
}

# ============================================
# HTTP BLOCK - Web Server Configuration
# ============================================
http {
    # Include MIME types file
    # Maps file extensions to content types:
    #   .html → text/html
    #   .css → text/css
    #   .js → application/javascript
    # Browsers need correct content types to process files properly
    include /etc/nginx/mime.types;
    
    # Default content type if file extension not recognized
    default_type application/octet-stream;

    # Access log format - defines what information to log per request
    # $remote_addr: client IP address
    # $time_local: when request was processed
    # $request: HTTP method, URL, protocol (e.g., "GET /api HTTP/1.1")
    # $status: HTTP response code (200, 404, 500, etc.)
    # $body_bytes_sent: size of response body
    # $http_referer: which page linked to this request
    # $http_user_agent: browser/client information
    # $http_x_forwarded_for: original client IP if behind proxy/load balancer
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    # Access log location and format
    # Logs every HTTP request (useful for analytics and debugging)
    access_log /var/log/nginx/access.log main;

    # Performance optimizations
    # sendfile on: use kernel's sendfile() instead of read()+write()
    #   WHY? Kernel can send file directly to network without copying to user space
    #   RESULT: 2-3x faster file serving, less CPU usage
    sendfile on;
    
    # tcp_nopush on: send response headers and file start in one packet
    #   WHY? Fewer packets = less overhead, faster load times
    #   Works with sendfile
    tcp_nopush on;
    
    # tcp_nodelay on: send small packets immediately (don't wait to batch)
    #   WHY? Lower latency for API responses and small files
    #   Slightly conflicts with tcp_nopush, but for different use cases
    tcp_nodelay on;
    
    # keepalive_timeout: how long to keep connection open for reuse
    #   65 seconds = browser can reuse connection for multiple files
    #   WHY? Avoids TCP handshake overhead for each file (faster page loads)
    keepalive_timeout 65;
    
    # types_hash_max_size: memory for MIME types lookup table
    #   2048 bytes is sufficient for standard MIME types
    types_hash_max_size 2048;
    
    # client_max_body_size: maximum upload size
    #   20MB allows reasonably large file uploads (images, etc.)
    #   Prevents attackers from uploading huge files that fill disk
    client_max_body_size 20M;

    # ============================================
    # GZIP COMPRESSION - Bandwidth Optimization
    # ============================================
    # Compresses responses before sending to client
    # Reduces bandwidth usage and speeds up page loads
    
    # Enable gzip compression
    gzip on;
    
    # Add 'Vary: Accept-Encoding' header
    # WHY? Tells caches (CDN, browser) to store separate versions
    #      for compressed and uncompressed clients
    gzip_vary on;
    
    # Compress responses from proxied servers too
    # 'any' = compress regardless of proxy headers
    gzip_proxied any;
    
    # Compression level (1-9)
    # 6 = good balance between compression ratio and CPU usage
    # 9 = max compression but 3x slower
    # 1 = fast but minimal compression
    gzip_comp_level 6;
    
    # File types to compress
    # HTML, CSS, JS, JSON, XML, fonts, SVG
    # WHY NOT compress images (JPEG, PNG)? Already compressed!
    gzip_types text/plain text/css text/xml text/javascript 
               application/json application/javascript application/xml+rss 
               application/rss+xml font/truetype font/opentype 
               application/vnd.ms-fontobject image/svg+xml;
    
    # Disable gzip for Internet Explorer 6 (buggy implementation)
    # msie6 = detects IE6 from User-Agent header
    gzip_disable "msie6";

    # ============================================
    # SERVER BLOCK - Virtual Host Configuration
    # ============================================
    server {
        # Listen on port 8080 (non-root user can't use port 80)
        # Kubernetes will map this to cluster network
        listen 8080;
        
        # Accept requests for any hostname
        # '_' is a catch-all (matches any host)
        # Ingress controller handles domain routing before reaching here
        server_name _;
        
        # Document root - where nginx looks for files to serve
        # Matches where Dockerfile copied files: COPY /app/dist /usr/share/nginx/html
        root /usr/share/nginx/html;
        
        # Default file to serve if directory is requested
        # GET / → serves /usr/share/nginx/html/index.html
        index index.html;

        # ============================================
        # SECURITY HEADERS
        # ============================================
        # Protect against common web vulnerabilities
        
        # X-Frame-Options: prevents clickjacking attacks
        # SAMEORIGIN = page can only be framed by same domain
        # WHY? Attackers can't embed your site in iframe to trick users
        add_header X-Frame-Options "SAMEORIGIN" always;
        
        # X-Content-Type-Options: prevents MIME-sniffing attacks
        # nosniff = browser must respect Content-Type header
        # WHY? Prevents browser from executing a file.txt as JavaScript
        add_header X-Content-Type-Options "nosniff" always;
        
        # X-XSS-Protection: legacy XSS filter (mostly replaced by CSP)
        # 1; mode=block = enable filter and block page if XSS detected
        # WHY? Extra layer of protection for older browsers
        add_header X-XSS-Protection "1; mode=block" always;
        
        # Referrer-Policy: controls how much referrer info is sent
        # no-referrer-when-downgrade = send full URL on HTTPS→HTTPS,
        #                               send nothing on HTTPS→HTTP
        # WHY? Protects user privacy while allowing analytics
        add_header Referrer-Policy "no-referrer-when-downgrade" always;

        # ============================================
        # LOCATION BLOCKS - URL Routing Rules
        # ============================================
        
        # Main location block - handles all requests
        location / {
            # React Router SPA magic!
            # try_files: try each option in order until one succeeds
            # 1. $uri: exact file match (e.g., /logo.png → /usr/share/nginx/html/logo.png)
            # 2. $uri/: try as directory with index.html
            # 3. /index.html: fallback - serve index.html for all other routes
            #
            # EXAMPLE FLOW:
            # GET /weather → no file /weather → no dir /weather/ → serve index.html
            # → React Router sees URL is /weather → renders Weather component
            #
            # GET /assets/main.js → file exists → serve /usr/share/nginx/html/assets/main.js
            #
            # This allows direct navigation to /weather (refresh works!)
            try_files $uri $uri/ /index.html;
        }

        # Static assets caching - maximize performance
        # Matches files by extension: .jpg, .css, .js, etc.
        # ~* = case-insensitive regex match
        location ~* \.(jpg|jpeg|png|gif|ico|css|js|svg|woff|woff2|ttf|eot)$ {
            # Cache for 1 year (maximum practical value)
            # WHY? Vite adds hash to filenames (main.abc123.js)
            #      If file changes, filename changes → browser fetches new file
            #      If file unchanged, browser uses cache → instant load!
            expires 1y;
            
            # Cache-Control header for browser and CDN caching
            # public = can be cached by browser and CDN
            # immutable = file will NEVER change (don't revalidate)
            # RESULT: Zero subsequent requests for assets = blazing fast loads
            add_header Cache-Control "public, immutable";
        }

        # index.html caching - always check for updates
        # Exact match (=) - highest priority
        location = /index.html {
            # Never cache index.html
            # WHY? index.html contains references to hashed assets
            #      If you deploy new version, index.html's asset references change
            #      Users must get fresh index.html to get new assets
            # no-cache = can cache but must revalidate with server
            # no-store = don't cache at all
            # must-revalidate = if cached, must check with server before using
            add_header Cache-Control "no-cache, no-store, must-revalidate";
            
            # Set expiry to past date (another way to prevent caching)
            expires 0;
        }
    }
}
